<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>AmigoWatch.com</title>

<link rel="icon"
type="image/png"
href="./imagenes/AmigoWatchLogo.png">

<link rel="shortcut icon"
type="image/png"
href="./imagenes/AmigoWatchLogo.png">

<style>

body{

    margin: 0;

    background: black;

    height: 100vh;

    overflow: hidden;

    font-family: Arial, Helvetica, sans-serif;

}

/* ========================= */
/* Fondo animado */
/* ========================= */

#fondoAnimado{

    position: fixed;

    width: 100%;

    height: 100%;

    overflow: hidden;

    pointer-events: none;

    z-index: 0;

}

.flotante{

    position: absolute;

    display: block;

    opacity: 0.35;

    user-select: none;

    pointer-events: none;

    animation:
    girar linear infinite,
    flotar ease-in-out infinite;

}

/* ========================= */
/* Página principal */
/* ========================= */

#paginaPrincipal{

    position: absolute;

    width: 100%;

    height: 100%;

    background: black;

    display: flex;

    justify-content: center;

    align-items: center;

    z-index: 1;

}

#menu{

    width: 550px;

    text-align: center;

}

#titulo{

    color: white;

    font-size: 42px;

    margin-bottom: 40px;

    letter-spacing: 2px;

}

.tarjeta{

    width: 100%;

    height: 75px;

    margin-bottom: 18px;

    background: rgba(20,20,20,0.95);

    border: 1px solid rgb(70,40,120);

    border-radius: 15px;

    color: white;

    font-size: 32px;

    display: flex;

    align-items: center;

    justify-content: center;

    cursor: pointer;

    transition: 0.25s;

}

.tarjeta:hover{

    transform: scale(1.03);

    box-shadow: 0px 0px 20px rgba(130,70,255,0.35);

}/* ========================= */
/* Pantalla contraseña */
/* ========================= */

#pantallaAcceso{

    position: absolute;

    width: 100%;

    height: 100%;

    display: flex;

    justify-content: center;

    align-items: center;

    background:
    radial-gradient(
    circle,
    #111111 0%,
    #000000 80%
    );

    transition:
    transform 1.5s cubic-bezier(
    0.25,
    0.8,
    0.25,
    1
    ),
    box-shadow 1.5s;

    z-index: 2;

}

.panel{

    width: 430px;

    background: rgba(20,20,20,0.95);

    border: 1px solid #444;

    border-radius: 18px;

    padding: 50px;

    text-align: center;

    box-shadow: 0px 0px 35px rgba(255,255,255,0.08);

}

.logo{

    color: white;

    font-size: 36px;

    font-weight: bold;

    letter-spacing: 5px;

    margin-bottom: 10px;

}

.subtitulo{

    color: #aaaaaa;

    margin-bottom: 35px;

    font-size: 15px;

    letter-spacing: 2px;

}

input{

    width: 100%;

    box-sizing: border-box;

    padding: 15px;

    background: #0d0d0d;

    border: 2px solid #555;

    border-radius: 10px;

    color: white;

    font-size: 18px;

    text-align: center;

    outline: none;

    transition: 0.3s;

}

input:focus{

    border-color: white;

    box-shadow:
    0 0 12px
    rgba(255,255,255,0.25);

}

button{

    margin-top: 25px;

    width: 100%;

    padding: 15px;

    background: white;

    color: black;

    border: none;

    border-radius: 10px;

    font-size: 18px;

    font-weight: bold;

    cursor: pointer;

    transition: 0.2s;

}

button:hover{

    transform: scale(1.03);

}

button:disabled{

    opacity: 0.8;

    cursor: default;

}

#mensaje{

    margin-top: 20px;

    font-size: 15px;

}

@keyframes girar{

    from{

        transform: rotate(0deg);

    }

    to{

        transform: rotate(360deg);

    }

}

@keyframes flotar{

    0%{

        translate: 0px 0px;

    }

    25%{

        translate: 45px -30px;

    }

    50%{

        translate: -55px 35px;

    }

    75%{

        translate: 30px 60px;

    }

    100%{

        translate: 0px 0px;

    }

}

.f1{left:3%;top:5%;width:160px;animation-duration:32s,12s;}
.f2{left:15%;top:75%;width:180px;animation-duration:45s,16s;}
.f3{left:30%;top:25%;width:130px;animation-duration:28s,10s;}
.f4{left:45%;top:55%;width:170px;animation-duration:50s,18s;}
.f5{left:60%;top:8%;width:120px;animation-duration:25s,9s;}
.f6{left:75%;top:70%;width:190px;animation-duration:58s,20s;}
.f7{left:90%;top:20%;width:140px;animation-duration:35s,14s;}
.f8{left:8%;top:45%;width:110px;animation-duration:22s,8s;}
.f9{left:22%;top:12%;width:150px;animation-duration:40s,15s;}
.f10{left:52%;top:82%;width:170px;animation-duration:53s,19s;}
.f11{left:70%;top:35%;width:125px;animation-duration:30s,11s;}
.f12{left:88%;top:88%;width:185px;animation-duration:60s,22s;}

</style>

</head>

<body>

<div id="fondoAnimado">

    <img src="./imagenes/FondoFlotante.png" class="flotante f1">
    <img src="./imagenes/FondoFlotante.png" class="flotante f2">
    <img src="./imagenes/FondoFlotante.png" class="flotante f3">
    <img src="./imagenes/FondoFlotante.png" class="flotante f4">
    <img src="./imagenes/FondoFlotante.png" class="flotante f5">
    <img src="./imagenes/FondoFlotante.png" class="flotante f6">
    <img src="./imagenes/FondoFlotante.png" class="flotante f7">
    <img src="./imagenes/FondoFlotante.png" class="flotante f8">
    <img src="./imagenes/FondoFlotante.png" class="flotante f9">
    <img src="./imagenes/FondoFlotante.png" class="flotante f10">
    <img src="./imagenes/FondoFlotante.png" class="flotante f11">
    <img src="./imagenes/FondoFlotante.png" class="flotante f12">

</div><div id="paginaPrincipal">

    <div id="menu">

        <div id="titulo">

            Elige qué ver

        </div>

        <div class="tarjeta">
            🎬 Películas
        </div>

        <div class="tarjeta">
            📺 Series
        </div>

        <div class="tarjeta">
            🎥 Videos
        </div>

        <div class="tarjeta">
            📱 Shorts
        </div>

        <div class="tarjeta">
            ✨ Animaciones
        </div>

        <div class="tarjeta">
            🚧 Próximos proyectos
        </div>

    </div>

</div>

<div id="pantallaAcceso">

    <div class="panel">

        <div class="logo">
            PASSWORD
        </div>

        <div class="subtitulo">
            ACCESS PASSWORD
        </div>

        <input
        type="password"
        id="password"
        placeholder="Enter Password">

        <button onclick="entrar()">
            ENTER
        </button>

        <div id="mensaje"></div>

    </div>

</div>

<script>

function entrar(){

    let clave =
    document.getElementById(
    "password"
    ).value;

    if(
    clave ==
    "AmigodThePlataformWatchVtomas742"
    ){

        document.getElementById(
        "mensaje"
        ).style.color =
        "#66ff66";

        document.getElementById(
        "mensaje"
        ).innerHTML =
        "Access Granted";

        document.querySelector(
        "button"
        ).disabled =
        true;        setTimeout(function(){

            let acceso =
            document.getElementById(
            "pantallaAcceso"
            );

            acceso.style.boxShadow =
            "0px 80px 120px rgba(0,0,0,0.95)";

            acceso.style.transform =
            "translateY(100vh)";

            setTimeout(function(){

                acceso.style.display =
                "none";

                acceso.innerHTML =
                "";

            },1600);

        },300);

    }

    else{

        document.getElementById(
        "mensaje"
        ).style.color =
        "#ff5555";

        document.getElementById(
        "mensaje"
        ).innerHTML =
        "Incorrect Password";

    }

}

</script>

</body>

</html>
